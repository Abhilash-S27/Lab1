<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">
    <h4 class="text-center mb-3">Inventory Management</h4>

    <input type="text" id="item" class="form-control mb-2" placeholder="Enter Item">
    <input type="number" id="qty" class="form-control mb-2" placeholder="Quantity">
    <input type="number" id="price" class="form-control mb-2" placeholder="Price">

    <button onclick="addItem()" class="btn btn-primary mb-3">Add</button>
    <button onclick="clearAll()" class="btn btn-danger mb-3">Clear All</button>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>

function addItem() {
    let name = document.getElementById("item").value;
    let qty = document.getElementById("qty").value;
    let price = document.getElementById("price").value;

    if (name === "" || qty === "" || price === "") {
        alert("Enter Item, Quantity and Price");
        return;
    }

    let total = qty * price;

    let row = document.createElement("tr");

    row.innerHTML =
        "<td>" + name + "</td>" +
        "<td>" + qty + "</td>" +
        "<td>" + price + "</td>" +
        "<td>" + total + "</td>" +
        "<td>" +
        "<button class='btn btn-warning btn-sm me-2'>Edit</button>" +
        "<button class='btn btn-danger btn-sm'>Delete</button>" +
        "</td>";

    // Edit button
    row.querySelector(".btn-warning").addEventListener("click", function () {
        document.getElementById("item").value = row.cells[0].innerText;
        document.getElementById("qty").value = row.cells[1].innerText;
        document.getElementById("price").value = row.cells[2].innerText;
        row.remove();
    });

    // Delete button
    row.querySelector(".btn-danger").addEventListener("click", function () {
        row.remove();
    });

    document.getElementById("list").appendChild(row);

    document.getElementById("item").value = "";
    document.getElementById("qty").value = "";
    document.getElementById("price").value = "";
}

function clearAll() {
    document.getElementById("list").innerHTML = "";
}

</script>

</body>
</html>
