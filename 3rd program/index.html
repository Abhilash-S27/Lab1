<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #f8f9fa);
            font-family: Arial, sans-serif;
        }
        .card {
            margin-top: 40px;
            border-radius: 12px;
        }
        .card-header {
            border-radius: 12px 12px 0 0;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Student Registration Form</h4>
                </div>

                <div class="card-body">
                    <form onsubmit="return validateForm()">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter full name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter email">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" placeholder="Enter password">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile Number</label>
                                <input type="text" id="mobile" class="form-control" placeholder="Enter mobile number">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" id="dob" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label d-block">Gender</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Male">
                                    <label class="form-check-label">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Female">
                                    <label class="form-check-label">Female</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Other">
                                    <label class="form-check-label">Other</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea id="address" class="form-control" rows="3" placeholder="Enter full address"></textarea>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success px-5">Submit</button>
                            <button type="reset" class="btn btn-secondary px-5 ms-2">Reset</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

    <script>
        function validateForm() {

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();
            let mobile = document.getElementById("mobile").value.trim();
            let dob = document.getElementById("dob").value;
            let gender = document.querySelector('input[name="gender"]:checked');
            let address = document.getElementById("address").value.trim();

            // Regular Expressions
            let nameRegex = /^[A-Za-z ]{3,}$/;
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;
            let mobileRegex = /^[6-9]\d{9}$/;

            if (!nameRegex.test(name)) {
                alert("Name must contain only letters and minimum 3 characters.");
                return false;
            }

            if (!emailRegex.test(email)) {  
                alert("Please enter a valid e mail address.");
                return false;
            }

            if (!passwordRegex.test(password)) {
                alert("Password must be at least 6 characters with letters and numbers.");
                return false;
            }

            if (!mobileRegex.test(mobile)) {
                alert("Enter a valid 10-digit mobile number.");
                return false;
            }

            if (dob === "") {
                alert("Please select your Date of Birth.");
                return false;
            }

            if (gender === null) {
                alert("Please select your gender.");
                return false;
            }

            if (address.length < 10) {
                alert("Address must contain at least 10 characters.");
                return false;
            }

            alert("Registration Successful!");
            return true;
        }
    </script>

</body>
</html>
